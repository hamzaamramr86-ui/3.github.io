    <div class="letter-body" id="letterBody"></div>
  </div>
</section>

<section id="surprise">
  <button class="surprise-btn" onclick="bigSurprise()">🎁 اضغط هنا للمفاجأة</button>
  <div class="surprise-result" id="surpriseResult">
    <div class="big-text">عيد ميلاد سعيد يا مجودي ❤️</div>
    <div class="sub-text">💫 كل سنة وانت طيب 💫</div>
    <div class="heart-final">♥</div>
  </div>
</section>

<button class="back-top" id="backTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<footer>
  <div class="footer-hearts">💗 ♡ 💗</div>
  <p>✦ من كل القلب ✦</p>
</footer>

<script>
  const isMobile = 'ontouchstart' in window;
  const pc = document.getElementById('particles-canvas');
  const pctx = pc.getContext('2d');
  let W, H;
  function resizeP() { W = pc.width = window.innerWidth; H = pc.height = window.innerHeight; }
  window.addEventListener('resize', resizeP); resizeP();

  const pCount = isMobile ? 40 : 80;
  const pStar = [];
  for (let i = 0; i < pCount; i++) pStar.push({ x: Math.random()*W, y: Math.random()*H, r: 0.3+Math.random()*1.5, a: 0.1+Math.random()*0.4, sp: 0.002+Math.random()*0.008, ph: Math.random()*6.28 });
  let pTime = 0;
  function drawP(){pTime++;pctx.clearRect(0,0,W,H);const grad=pctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.5);grad.addColorStop(0,'rgba(139,26,43,0.02)');grad.addColorStop(1,'transparent');pctx.fillStyle=grad;pctx.fillRect(0,0,W,H);for(const s of pStar){const tw=0.3+Math.sin(pTime*s.sp+s.ph)*0.7;pctx.globalAlpha=s.a*tw;pctx.beginPath();pctx.arc(s.x,s.y,s.r,0,6.28);pctx.fillStyle='#FFF0F0';pctx.shadowColor='#C41E3A';pctx.shadowBlur=s.r*8;pctx.fill();}pctx.shadowBlur=0;requestAnimationFrame(drawP);}
  drawP();

  const fhC = document.getElementById('floatHearts');
  for(let i=0;i<25;i++) createFH();
  function createFH(){const el=document.createElement('div');el.className='fh';const dur=10+Math.random()*15,del=Math.random()*15;el.style.animation='fhFloat '+dur+'s '+del+'s linear forwards';el.textContent=['♥','♡','💗','💕','❤'][Math.floor(Math.random()*5)];el.style.left=Math.random()*100+'%';el.style.fontSize=(12+Math.random()*28)+'px';el.style.color=['#fff','#FFF0F0','#C41E3A','#8B1A2B','#FF6B6B'][Math.floor(Math.random()*5)];fhC.appendChild(el);setTimeout(()=>el.remove(),(dur+del)*1000+500);}
  setInterval(createFH,2500);

  const fbC = document.getElementById('floatBalloons');
  const balloonEmojis = ['🎈','🎈','🎈','🎉','🎊'];
  if(!isMobile) for(let i=0;i<10;i++) createFB();
  function createFB(){const el=document.createElement('div');el.className='fb';const dur=12+Math.random()*18,del=Math.random()*10;el.style.animation='fbFloat '+dur+'s '+del+'s linear forwards';el.textContent=balloonEmojis[Math.floor(Math.random()*balloonEmojis.length)];el.style.left=Math.random()*100+'%';el.style.fontSize=(24+Math.random()*36)+'px';el.style.color=['#FF6B6B','#FFD700','#FF69B4','#87CEEB','#98FB98','#DDA0DD','#FFA07A'][Math.floor(Math.random()*7)];fbC.appendChild(el);setTimeout(()=>el.remove(),(dur+del)*1000+500);}
  !isMobile&&setInterval(createFB,3000);

  function startConfetti(){const colors=['#C41E3A','#FFD700','#FF6B6B','#FF69B4','#87CEEB','#98FB98','#DDA0DD','#fff'];for(let i=0;i<40;i++){setTimeout(()=>{const el=document.createElement('div');el.className='confetti-piece';el.style.left=Math.random()*100+'%';el.style.width=(4+Math.random()*6)+'px';el.style.height=(4+Math.random()*6)+'px';el.style.background=colors[Math.floor(Math.random()*colors.length)];el.style.borderRadius=Math.random()>0.5?'50%':'0';el.style.animationDuration=(2+Math.random()*2)+'s';document.body.appendChild(el);setTimeout(()=>el.remove(),5000);},i*60);}}

  !isMobile&&document.addEventListener('mousemove',e=>{const s=document.createElement('div');s.className='sparkle';s.style.left=(e.clientX-4)+'px';s.style.top=(e.clientY-4)+'px';s.style.width=s.style.height=(3+Math.random()*4)+'px';s.style.background=['#FFD700','#FFA500','#FF6B6B','#fff'][Math.floor(Math.random()*4)];s.style.boxShadow='0 0 8px currentColor, 0 0 16px currentColor';document.body.appendChild(s);setTimeout(()=>s.remove(),600);});

  const audio = document.getElementById('bgMusic'); let musicOn = true;
  function toggleMusic(){const btn=document.getElementById('musicBtn');if(musicOn){audio.pause();btn.textContent='♪';btn.classList.remove('pulse');}else{audio.play().catch(()=>{});btn.textContent='♫';btn.classList.add('pulse');}musicOn=!musicOn;}
  function startMusic(){audio.volume=0.4;audio.play().then(()=>{document.getElementById('musicBtn').textContent='♫';}).catch(()=>{});}

  window.addEventListener('scroll',()=>{const s=window.scrollY/(document.body.scrollHeight-window.innerHeight);document.getElementById('scrollProgress').style.width=(s*100)+'%';document.getElementById('backTop').style.display=s>0.3?'flex':'none';});

  let age=0;
  function countAge(){const target=16;if(age<target){age++;document.getElementById('ageDisplay').textContent=age;setTimeout(countAge,80);}else if(age===target){const r=document.getElementById('ageDisplay').getBoundingClientRect();megaBurst(r.left+r.width/2,r.top+r.height/2,25);megaDots(r.left+r.width/2,r.top+r.height/2,15);setTimeout(()=>megaBurst(r.left+r.width/2,r.top+r.height/2,15),600);}}

  function openGift(){
    const cx=window.innerWidth/2,cy=window.innerHeight/2;
    megaBurst(cx,cy,40);megaDots(cx,cy,30);
    setTimeout(()=>{megaBurst(cx,cy-50,25);megaDots(cx,cy-50,20);},300);
    document.getElementById('giftOverlay').classList.add('hide');
    setTimeout(()=>{
      document.getElementById('loader').classList.add('hide');
      startMusic();
      setTimeout(countAge,500);
      initTypewriter(); initLetter();
      setTimeout(startConfetti, 800);
    },1200);
  }
  document.getElementById('giftOverlay').addEventListener('click',openGift);
  setTimeout(()=>{if(!document.getElementById('giftOverlay').classList.contains('hide'))openGift();},10000);

  function initTypewriter(){const txt='في ذا اليوم… <span class="highlight">انت</span> أنولدت ❤️';const el=document.getElementById('typewriter');let i=0;function ty(){if(i<=txt.length){el.innerHTML=txt.substring(0,i)+'<span class="typewriter"></span>';i++;setTimeout(ty,50+Math.random()*40);}}setTimeout(ty,500);}

  function initLetter(){const msg='كل سنه وانت طيب يامجودي 💗';const el=document.getElementById('letterBody');let i=0;function ty(){if(i<=msg.length){el.textContent=msg.substring(0,i);i++;const sp=30+Math.random()*20;setTimeout(ty,sp);}else{el.innerHTML+='<span class="cursor-blink"></span>';}}const ob=new IntersectionObserver(e=>{if(e[0].isIntersecting){setTimeout(ty,500);ob.disconnect();}});ob.observe(el);}

  document.querySelectorAll('.cinematic-box,.letter-card').forEach(el=>{el.style.opacity='0';el.style.transform='translateY(30px)';el.style.transition='all 0.8s ease';new IntersectionObserver(e=>{if(e[0].isIntersecting){e[0].target.style.opacity='1';e[0].target.style.transform='translateY(0)';}},{threshold:0.2}).observe(el);});

  function bigSurprise(){
    startConfetti();const cx=window.innerWidth/2,cy=window.innerHeight/2;
    const m=isMobile?0.5:1;megaBurst(cx,cy,60*m);megaDots(cx,cy,45*m);
    setTimeout(()=>{document.getElementById('surpriseResult').classList.add('show');megaBurst(cx,cy-100,35*m);megaDots(cx,cy-100,30*m);},300);
    setTimeout(()=>{megaBurst(cx+200,cy-150,25*m);megaBurst(cx-200,cy+100,25*m);},800);
    for(let r=0;r<(isMobile?2:5);r++){setTimeout(()=>{const x=Math.random()*window.innerWidth,y=Math.random()*window.innerHeight;megaBurst(x,y,15*m);megaDots(x,y,10*m);},r*400+200);}
    for(let i=0;i<(isMobile?3:8);i++){setTimeout(()=>{lyricNote();},i*500+200);}
  }

  function lyricNote(){const el=document.createElement('div');el.className='lyric-note';const lyrics=['♪ Love me not','♫ Love me not','♬ Love me not','♪ لـكلمات','♫ الأغنية','♬ Love...'];el.textContent=lyrics[Math.floor(Math.random()*lyrics.length)];el.style.left=Math.random()*80+10+'%';el.style.fontSize=(12+Math.random()*10)+'px';el.style.animationDuration=(4+Math.random()*3)+'s';document.body.appendChild(el);setTimeout(()=>el.remove(),7000);}

  function megaBurst(x,y,count){
    const icons=['♥','♡','💗','💕','❤','✨','🌟','⭐','💫','🎉','🎊'];
    for(let i=0;i<count;i++){
      const el=document.createElement('div');el.className='burst-particle';
      el.textContent=icons[Math.floor(Math.random()*icons.length)];
      el.style.left=x+'px';el.style.top=y+'px';
      el.style.fontSize=(16+Math.random()*34)+'px';
      el.style.color=['#fff','#FFF0F0','#C41E3A','#8B1A2B','#FFD700','#FF6B6B','#fff'][Math.floor(Math.random()*7)];
      const a=Math.random()*360,d=80+Math.random()*300;
      el.style.setProperty('--bx',Math.cos(a*Math.PI/180)*d+'px');el.style.setProperty('--by',Math.sin(a*Math.PI/180)*d+'px');
      el.style.animationDuration=(1+Math.random()*1.2)+'s';document.body.appendChild(el);setTimeout(()=>el.remove(),3000);
    }
  }
  function megaDots(x,y,count){
    for(let i=0;i<count;i++){
      const d=document.createElement('div');d.className='burst-dot';
      d.style.left=(x+(Math.random()-0.5)*40)+'px';d.style.top=(y+(Math.random()-0.5)*40)+'px';
      d.style.width=d.style.height=(3+Math.random()*8)+'px';
      d.style.background=['#C41E3A','#8B1A2B','#FF6B6B','#FFD700','#fff','#FFF0F0'][Math.floor(Math.random()*6)];
      d.style.boxShadow='0 0 20px currentColor, 0 0 60px currentColor, 0 0 100px currentColor';
      const a=Math.random()*360,d2=60+Math.random()*200;
      d.style.setProperty('--dx',Math.cos(a*Math.PI/180)*d2+'px');d.style.setProperty('--dy',Math.sin(a*Math.PI/180)*d2+'px');
      d.style.animationDuration=(1.5+Math.random()*1.5)+'s';document.body.appendChild(d);setTimeout(()=>d.remove(),3500);
    }
  }

</script>
</body>
</html>
